name: Build → Publish → Bump kustomize overlay
on:
  release:
    types: [published]

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  REGION: ${{ secrets.GKE_REGION }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  build-and-push:
    name: Build and Push Docker image
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print all env vars
        run: |
          echo "PROJECT_ID = $PROJECT_ID"
          echo "REGION     = $REGION"
          echo "GCP_SA_KEY = $GCP_SA_KEY"
          echo "IMAGE_NAME = $IMAGE_NAME"
          echo "IMAGE_TAG  = $IMAGE_TAG"

      - id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ env.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Configure Docker
        run: |
          gcloud auth configure-docker

      - name: Configure Artifact Registry
        run: |
          gcloud auth configure-docker \
          ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker
        id: build-image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  commit-to-overlay:
    name: Commit to Reconciliation Repo
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: ${{ needs.build-and-push.result == 'success' }}
    strategy:
      matrix:
        overlay: [ production-en-in ]
    steps:
      - name: Echo shasum for repo ${{ env.IMAGE_NAME }}
        id: echo-sha
        run: |
          echo "github_sha: $GITHUB_SHA"
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Clone manifests-index repo
        run: |
          git config --global user.email ${{ secrets.GH_USER_EMAIL }}
          git config --global user.name ${{ secrets.GH_USER_NAME }}
          git clone -b develop https://.:${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}@github.com/agumbe-ai/manifests-index.git
          cd manifests-index
          git fetch origin develop
          git checkout develop
          git reset --hard origin/develop
          echo "clone repo success"

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Bump Kustomize image in ${{ matrix.overlay }} overlay
        run: |
          cd manifests-index/infra/k8s/${IMAGE_NAME}/overlays/${{ matrix.overlay }}
          kustomize edit set image \
            ${REGION}-docker.pkg.dev/${PROJECT_ID}/${IMAGE_NAME}/${IMAGE_NAME}=${REGION}-docker.pkg.dev/${PROJECT_ID}/${IMAGE_NAME}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Commit to manifests-index, ${{ matrix.overlay }} overlay
        run: |
          cd manifests-index && git add . && git commit -m "chore: bump ${IMAGE_NAME} → ${{ steps.echo-sha.outputs.sha_short }} in overlay ${{ matrix.overlay }}" && git push origin develop --force-with-lease
