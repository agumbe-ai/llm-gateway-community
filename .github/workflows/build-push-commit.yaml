name: Build and Push Docker Image, Commit to Recon
on:
  push:
    branches:
      - development

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  REGION: ${{ secrets.GKE_REGION }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_TAG: development

jobs:
  execute-unit-tests:
    name: Run the Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: npm install && npm run test:ci

  build-and-push:
    name: Build and Push Docker image
    needs: [execute-unit-tests]
    if: ${{ (needs.execute-unit-tests.result == 'success') }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker

      - name: Configure Artifact Registry
        run: |
          gcloud auth configure-docker \
          ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker (dev Dockerfile)
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  commit:
    name: Commit to Reconciliation Repo
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: ${{ needs.build-and-push.result == 'success' }}
    steps:
      - name: Echo
        id: echo-sha
        run: |
          echo "github_sha: " $GITHUB_SHA
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Clone
        run: |
          git config --global user.email ${{ secrets.GH_USER_EMAIL }}
          git config --global user.name ${{ secrets.GH_USER_NAME }}
          git clone -b develop https://.:${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}@github.com/agumbe-ai/manifests-index.git
          echo "clone repo success"

      - name: Substitute
        run: |
          sed -i "s/value.*$/value\: $GITHUB_SHA/" manifests-index/infra/k8s/$IMAGE_NAME/overlays/development/build-version-patch.yaml

      - name: Commit
        run: |
          cd manifests-index && git add . && git commit -m "$IMAGE_NAME updated with ${{ steps.echo-sha.outputs.sha_short }} on branch $IMAGE_TAG" && git push origin develop
